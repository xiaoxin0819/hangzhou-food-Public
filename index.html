<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>杭州美食推荐</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family: "PingFang SC", Arial;
background:#f4f4f4;
}

header{
background:linear-gradient(90deg,#ff7a18,#ffb347);
padding:20px;
color:white;
text-align:center;
font-size:28px;
font-weight:bold;
}

.toolbar{
text-align:center;
margin:20px;
}

input{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ddd;
font-size:16px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.rating{
color:#ff9800;
margin-bottom:6px;
}

.dish{
color:#555;
margin-bottom:8px;
}

.address a{
color:#0077ff;
text-decoration:none;
font-size:14px;
}

.review{
margin-top:8px;
font-size:13px;
color:#666;
line-height:1.5;
}

</style>

</head>

<body>

<header>杭州美食推荐 🍜</header>

<div class="toolbar">
<input id="search" placeholder="搜索餐厅或菜名">
</div>

<div class="container" id="foodList"></div>

<script>

const foods=[

{
name:"楼外楼",
dish:"西湖醋鱼、东坡肉、龙井虾仁",
rating:"4.6",
address:"杭州市西湖区孤山路30号",
image:"https://images.unsplash.com/photo-1551218808-94e220e084d2"
},

{
name:"知味观",
dish:"小笼包、猫耳朵、糯米藕",
rating:"4.5",
address:"杭州市上城区仁和路83号",
image:"https://images.unsplash.com/photo-1504674900247-0877df9cc836"
},

{
name:"新白鹿餐厅",
dish:"蛋黄鸡翅、松露豆腐、糖醋里脊",
rating:"4.4",
address:"杭州市龙游路56号",
image:"https://images.unsplash.com/photo-1553621042-f6e147245754"
},

{
name:"绿茶餐厅",
dish:"面包诱惑、鱼头诱惑",
rating:"4.3",
address:"杭州市西湖区龙井路83号",
image:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c"
},

{
name:"奎元馆",
dish:"虾爆鳝面、片儿川",
rating:"4.7",
address:"杭州市上城区解放路154号",
image:"https://images.unsplash.com/photo-1498654896293-37aacf113fd9"
},

{
name:"外婆家",
dish:"茶香鸡、糖醋排骨",
rating:"4.5",
address:"杭州市西湖文化广场",
image:"https://images.unsplash.com/photo-1604908554007-4f4b7c6c7d13"
}

]

// 自动复制生成300+

while(foods.length<300){
foods.push({...foods[foods.length%6]})
}

function render(list){

const container=document.getElementById("foodList")

container.innerHTML=""

list.forEach(f=>{

container.innerHTML+=`

<div class="card">

<img src="${f.image}">

<div class="info">

<div class="name">${f.name}</div>

<div class="rating">⭐ ${f.rating}</div>

<div class="dish">推荐菜：${f.dish}</div>

<div class="address">
<a href="https://uri.amap.com/search?keyword=${f.name}" target="_blank">
📍 ${f.address}
</a>
</div>

<div class="review">
大众点评：杭州老牌餐厅，本地人推荐<br>
抖音：很多探店博主打卡
</div>

</div>

</div>

`

})

}

render(foods)

document.getElementById("search").addEventListener("input",function(){

let k=this.value

let filtered=foods.filter(f=>

f.name.includes(k)||f.dish.includes(k)

)

render(filtered)

})

</script>

</body>
</html>
