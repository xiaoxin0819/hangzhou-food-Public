<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<title>杭州美食推荐300+</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
杭州美食推荐（300+餐厅）
</header>

<div class="toolbar">

<input id="search" placeholder="搜索餐厅或菜名">

<select id="category">
<option value="">全部分类</option>
<option value="杭帮菜">杭帮菜</option>
<option value="小吃">小吃</option>
<option value="面馆">面馆</option>
<option value="火锅">火锅</option>
<option value="网红餐厅">网红餐厅</option>
</select>

<select id="district">
<option value="">全部区域</option>
<option value="西湖区">西湖区</option>
<option value="上城区">上城区</option>
<option value="拱墅区">拱墅区</option>
<option value="滨江区">滨江区</option>
</select>

</div>

<div class="container" id="foodList"></div>

<script src="app.js"></script>

</body>
</html>
